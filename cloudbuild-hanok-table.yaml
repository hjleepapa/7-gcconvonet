# Deploy only hanok-table-service (5th microservice). Same Artifact Registry pattern as other services.
# Prerequisite: ./hanok_table/ exists at repo root (see hanok_table/README.md).
#
# Usage from repo root:
#   gcloud builds submit --config cloudbuild-hanok-table.yaml --substitutions=_COMMIT_SHA=latest .
substitutions:
  _COMMIT_SHA: 'latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA',
        '-f',
        'docker/hanok-table.Dockerfile',
        '.',
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hanok-table-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
