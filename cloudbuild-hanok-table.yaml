# Deploy only hanok-table-service (Hanok / kfood FastAPI).
# Usage: gcloud builds submit --config cloudbuild-hanok-table.yaml --substitutions=_COMMIT_SHA=latest .
# Ensure submodule: git submodule update --init kfood
# Env vars on Cloud Run are unchanged; only the image is updated.
substitutions:
  _COMMIT_SHA: 'latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA',
        '-f',
        'docker/hanok-table.Dockerfile',
        '.',
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hanok-table-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/hanok-table-service:$_COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
